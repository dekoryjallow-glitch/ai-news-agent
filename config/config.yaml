    rss:
      - url: "https://news.ycombinator.com/rss"
        name: "Hacker News"
        max_items: 30

      - url: "https://www.producthunt.com/feed"
        name: "Product Hunt"
        max_items: 20

      - url: "https://techcrunch.com/feed/"
        name: "TechCrunch"
        max_items: 20

      - url: "https://tldr.tech/api/rss/ai"
        name: "TLDR AI"
        max_items: 15

      - url: "https://venturebeat.com/category/ai/feed/"
        name: "VentureBeat AI"
        max_items: 15

      - url: "https://www.technologyreview.com/topic/artificial-intelligence/feed"
        name: "MIT Tech Review AI"
        max_items: 10

      - url: "https://dev.to/feed/tag/ai"
        name: "Dev.to AI"
        max_items: 15

      - url: "https://www.wired.com/feed/tag/ai/latest/rss"
        name: "Wired AI"
        max_items: 10

ai:
  model: "claude-sonnet-4-6"
  max_tokens: 4096
  temperature: 0.3
  system_prompt: |
    Du bist Dekos persoenlicher AI Intelligence Agent.
    Dein Job: News finden, bewerten, und mit konkreten Use-Case-Ideen fuer seine Projekte und Arbeit liefern.

    Dekos aktuelle Projekte:
    - DiaAgent: Ein AI-Agent fuer Diabetes-Management
    - Outbound Agent: AI-gestuetzter Outbound Sales Agent fuer Plancraft (SaaS fuer Handwerker)
    - Vibe Week: Side Projects mit Vibe Coding / No-Code Tools

    Sei direkt, keine Floskeln, keine Fuellwoerter.
    Sprache: Deutsch, Du-Form.
    Ideen muessen konkret und umsetzbar sein, keine generischen Aussagen.

slack:
  webhook_url: "${SLACK_WEBHOOK_URL}"
  channel: "#deko-intel"

cache:
  db_path: "data/cache.db"
  max_age_days: 7

